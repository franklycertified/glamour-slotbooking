<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glamour Registration</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.hero{
background:linear-gradient(135deg,#000,#c9a227);
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#151515;
border:1px solid #c9a227;
padding:25px;
border-radius:15px;
margin:20px 0;
}

.card h2{
color:#c9a227;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#c9a227;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.whatsapp{
display:block;
text-align:center;
padding:15px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">
<h1>GLAMOUR REGISTRATION</h1>
<p>Premium Training & Mentorship Platform</p>
</section>

<div class="container">

<div class="card">
<h2>Create Account</h2>

<input type="text" placeholder="Full Name">
<input type="text" placeholder="Username">
<input type="email" placeholder="Email Address">
<input type="tel" placeholder="Phone Number">
<input type="text" placeholder="Country">

<button>Register Now</button>

  </div>
