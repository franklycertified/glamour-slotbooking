<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glamour Slot Booking</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: 60px auto;
  padding: 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  backdrop-filter: blur(10px);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.box {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}

.whatsapp {
  display: block;
  margin-top: 15px;
  padding: 12px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Glamour Slot Booking</h1>
    <p>Register and secure your slot</p>
  </div>

  <div class="card">
    <h2>Create Account</h2>

    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email" required>
      <input type="number" placeholder="Phone Number" required>
      <button type="submit">Register</button>
    </form>
  </div>

  <div class="box">
    <h3>Payment Details</h3>
    <p><b>Bank:</b> Palmpay</p>
    <p><b>Account Name:</b> Juliet Nzekwe</p>
    <p><b>Account Number:</b> 8161380755</p>
  </div>

  <a class="whatsapp" href="https://wa.me/2348161380755">
    Contact WhatsApp Support
  </a>

</div>

</body>
</html>
